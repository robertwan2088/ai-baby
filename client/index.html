    af('/api/auth/login',{method:'POST',body:JSON.stringify({phone:ph,password:pw,captcha_id:ci,captcha_code:cp})})

/* ===== Chat ===== */
var chatOk=false,chatBusy=false;
function initChat(){
  if(!chatOk){
    chatOk=true;
    addMsg('mai','你好！我是AI育儿助手 \ud83e\udd16\n\n你可以问我任何育儿问题，比如：\n\u2022 宝宝辅食怎么添加？\n\u2022 如何培养孩子的阅读习惯？\n\u2022 孩子不爱吃饭怎么办？');
    document.getElementById('chat-send').addEventListener('click',sendChat);
    document.getElementById('chat-in').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}});
    document.getElementById('chat-in').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'});
  }
}
function addMsg(cls,text){
  var box=document.getElementById('chat-msgs'),d=document.createElement('div');d.className='mg '+cls;
  d.innerHTML='<div class="mav">'+(cls==='mu'?'\ud83d\ude0a':'\ud83e\udd16')+'</div><div class="mbb">'+esc(text).replace(/\n/g,'<br>')+'</div>';
  box.appendChild(d);box.scrollTop=box.scrollHeight;
}
function sendChat(){
  if(chatBusy)return;var inp=document.getElementById('chat-in'),text=inp.value.trim();if(!text)return;inp.value='';inp.style.height='auto';addMsg('mu',text);chatBusy=true;
  var box=document.getElementById('chat-msgs'),td=document.createElement('div');td.className='mg mai';td.id='typing';
  td.innerHTML='<div class="mav">\ud83e\udd16</div><div class="mbb"><div class="tyi"><span></span><span></span><span></span></div></div>';
  box.appendChild(td);box.scrollTop=box.scrollHeight;
  af('/api/chat',{method:'POST',body:JSON.stringify({message:text})})
  .then(function(d){var t=document.getElementById('typing');if(t)t.remove();chatBusy=false;if(d&&d.success!==false&&d.reply)addMsg('mai',d.reply);else addMsg('mai','抱歉，我暂时无法回答，请稍后再试。')})
  .catch(function(){var t=document.getElementById('typing');if(t)t.remove();chatBusy=false;addMsg('mai','网络错误，请稍后再试。')});
}

/* ===== Book Create ===== */
var bookStep=1,bookData={name:'',age:'',gender:'\u7537',hobby:'',theme:''};
var themes=[{id:'sleep',icon:'\ud83c\udf19',name:'睡前故事'},{id:'adventure',icon:'\ud83d\uddfa\ufe0f',name:'冒险探索'},{id:'friendship',icon:'\ud83e\udd1d',name:'友谊成长'},{id:'learning',icon:'\ud83d\udcda',name:'学习发现'},{id:'bravery',icon:'\ud83e\udd81',name:'勇气故事'}];

function initBook(){bookStep=1;bookData={name:'',age:'',gender:'\u7537',hobby:'',theme:''};renderBook()}

function renderBook(){
  var c=document.getElementById('book-ctn'),dots='';for(var i=1;i<=3;i++)dots+='<div class="sdot'+(i<=bookStep?' on':'')+'"></div>';
  if(bookStep===1){
    c.innerHTML='<div class="bst">'+dots+'</div><div style="padding:0 20px 20px"><div style="text-align:center;margin-bottom:20px"><h3 style="font-size:18px;color:#333">\ud83e\uddd2 告诉我关于孩子的信息</h3><p style="font-size:13px;color:#999;margin-top:4px">我们将根据这些信息生成专属绘本</p></div>'+
    '<div class="fg"><label>孩子名字</label><input class="fi" id="bk-name" type="text" placeholder="请输入孩子的名字"></div>'+
    '<div class="fg"><label>年龄</label><input class="fi" id="bk-age" type="text" placeholder="例如：3岁"></div>'+
    '<div class="fg"><label>性别</label><div class="gsl" id="bk-gs"><div class="go2 sel" data-v="\u7537">\ud83d\udc66 男孩</div><div class="go2" data-v="\u5973">\ud83d\udc67 女孩</div></div></div>'+
    '<div class="fg"><label>兴趣爱好</label><input class="fi" id="bk-hobby" type="text" placeholder="例如：画画、恐龙、公主..."></div>'+
    '<button class="btn btn-p" id="bk-next1" style="margin-top:8px">下一步</button></div>';
    // gender select
    document.getElementById('bk-gs').addEventListener('click',function(e){
      var opt=e.target.closest('.go2');if(!opt)return;
      this.querySelectorAll('.go2').forEach(function(el){el.classList.remove('sel')});
      opt.classList.add('sel');bookData.gender=opt.getAttribute('data-v');
    });
    document.getElementById('bk-next1').addEventListener('click',function(){
      bookData.name=document.getElementById('bk-name').value.trim();
      bookData.age=document.getElementById('bk-age').value.trim();
      bookData.hobby=document.getElementById('bk-hobby').value.trim();
      if(!bookData.name){toast('请输入孩子名字');return}
      bookStep=2;renderBook();
    });
  } else if(bookStep===2){
    var th='';
    themes.forEach(function(t){th+='<div class="tc" data-id="'+t.id+'"><div class="tci">'+t.icon+'</div><div class="tcn">'+t.name+'</div></div>'});
    c.innerHTML='<div class="bst">'+dots+'</div><div style="padding:0 20px 20px"><div style="text-align:center;margin-bottom:20px"><h3 style="font-size:18px;color:#333">\ud83d\udcd6 选择故事主题</h3><p style="font-size:13px;color:#999;margin-top:4px">为'+esc(bookData.name)+'选择一个喜欢的故事类型</p></div>'+
    '<div class="tg" id="bk-themes">'+th+'</div><button class="btn btn-p" id="bk-gen" style="margin-top:20px">开始生成绘本 ✨</button></div>';
    document.getElementById('bk-themes').addEventListener('click',function(e){
      var card=e.target.closest('.tc');if(!card)return;
      this.querySelectorAll('.tc').forEach(function(el){el.classList.remove('sel')});
      card.classList.add('sel');bookData.theme=card.getAttribute('data-id');
    });
    document.getElementById('bk-gen').addEventListener('click',function(){
      if(!bookData.theme){toast('请选择故事主题');return}
      var sel=themes.find(function(t){return t.id===bookData.theme});
      bookStep=3;renderBook();
      var prompt='请为一名'+bookData.age+'的'+bookData.gender+'孩'+esc(bookData.name)+'创作一个'+(sel?sel.name:'')+'绘本故事。'+(bookData.hobby?'孩子喜欢'+esc(bookData.hobby)+'，':'')+'故事要温馨有趣，适合孩子听，分成几个小节，每节有小标题。';
      af('/api/chat',{method:'POST',body:JSON.stringify({message:prompt})})
      .then(function(d){
        var ld=document.getElementById('bk-loading');if(ld)ld.remove();
        if(d&&d.success!==false&&d.reply){
          document.getElementById('book-ctn').innerHTML='<div class="bst"><div class="sdot on"></div><div class="sdot on"></div><div class="sdot on"></div></div><div class="sdy">'+esc(d.reply).replace(/\n/g,'<br>')+'</div><button class="btn btn-p lob" id="bk-retry">重新生成</button>';
          document.getElementById('bk-retry').addEventListener('click',function(){initBook()});
        }else{document.getElementById('book-ctn').innerHTML+='<p style="text-align:center;color:#999;padding:20px">生成失败，请重试</p>'}
      }).catch(function(){
        var ld=document.getElementById('bk-loading');if(ld)ld.remove();
        document.getElementById('book-ctn').innerHTML+='<p style="text-align:center;color:#999;padding:20px">网络错误，请重试</p>';
      });
    });
  } else if(bookStep===3){
    c.innerHTML='<div class="bst"><div class="sdot on"></div><div class="sdot on"></div><div class="sdot on"></div></div><div class="es2" id="bk-loading"><div class="spc"></div><p style="margin-top:16px">正在为'+esc(bookData.name)+'创作专属绘本...</p><p style="font-size:12px;color:#ccc;margin-top:4px">AI正在努力构思中 ✨</p></div>';
  }
}

/* ===== Profile ===== */
function loadProfile(){
  var u=gu();
  document.getElementById('p-name').textContent=(u&&u.nickname)||'用户';
  document.getElementById('p-phone').textContent=u&&u.phone?mp(u.phone):'';
  af('/api/babies').then(function(d){

      if(d.length>0){var h='';d.forEach(function(b){h+=renderBabyCard(b)});el.innerHTML=h}
      else{el.innerHTML='<div class="es2"><div class="esi">\ud83d\udc76</div><div>还没有添加宝贝</div></div>'}
    }else if(d&&d.babies&&Array.isArray(d.babies)){
      if(d.babies.length>0){var h='';d.babies.forEach(function(b){h+=renderBabyCard(b)});el.innerHTML=h}

  }).catch(function(){document.getElementById('baby-list').innerHTML='<div class="es2"><div class="esi">\ud83d\udc76</div><div>还没有添加宝贝</div></div>'});

function renderBabyCard(b){
  var avatar=b.avatar||'\ud83d\udc76';
  var meta='';
  if(b.gender)meta+=(b.gender==='男'?'\u7537\u5b69':'\u5973\u5b69');
  if(b.birthday)meta+=(meta?' \u00b7 ':'')+b.birthday;
  return '<div class="bc"><div class="bca">'+esc(avatar)+'</div><div class="bcf"><div class="bcn">'+esc(b.name||'')+'</div>'+(meta?'<div class="bcm">'+esc(meta)+'</div>':'')+'</div><div class="bcact"><button class="btn btn-s btn-o baby-edit-btn" data-id="'+(b.id||b._id)+'">编辑</button><button class="btn btn-s baby-del-btn" data-id="'+(b.id||b._id)+'" style="background:#fff;color:#FF4757;border:1px solid #FF4757">删除</button></div></div>';
}

/* ===== Baby Add/Edit ===== */
var emojis=['\ud83d\udc76','\ud83d\udc67','\ud83d\udc66','\ud83e\uddd2','\ud83e\uddd1','\ud83d\udc69','\ud83d\udc68','\ud83c\udf38','\ud83d\udc9c','\u2b50','\ud83c\udf1f','\ud83e\udde9'];

function renderBabyForm(containerId,baby){
  var isEdit=!!baby;var bid=baby?(baby.id||baby._id):null;
  var selEmoji=baby?(baby.avatar||'\ud83d\udc76'):'\ud83d\udc76';
  var selGender=baby?(baby.gender||'\u7537'):'\u7537';
  var eg='';emojis.forEach(function(e){eg+='<div class="ei2'+(e===selEmoji?' sel':'')+'" data-e="'+e+'">'+e+'</div>'});
  var html='<div class="fg"><label>头像</label><div class="eg2" id="emoji-sel">'+eg+'</div></div>'+
  '<div class="fg"><label>姓名</label><input class="fi" id="bf-name" type="text" placeholder="请输入宝贝姓名" value="'+esc(baby?baby.name:'')+'"></div>'+
  '<div class="fg"><label>性别</label><div class="gsl" id="bf-gs"><div class="go2'+(selGender==='\u7537'?' sel':'')+'" data-v="\u7537">\ud83d\udc66 男孩</div><div class="go2'+(selGender==='\u5973'?' sel':'')+'" data-v="\u5973">\ud83d\udc67 女孩</div></div></div>'+
  '<div class="fg"><label>生日</label><input class="fi" id="bf-bday" type="date" value="'+(baby&&baby.birthday?baby.birthday.substring(0,10):'')+'"></div>'+
  '<div class="fg"><label>兴趣爱好</label><input class="fi" id="bf-fav" type="text" placeholder="例如：画画、游泳..." value="'+esc(baby&&baby.favorite?baby.favorite:'')+'"></div>'+
  '<button class="btn btn-p" id="bf-save" style="margin-top:8px">'+(isEdit?'保存修改':'添加宝贝')+'</button>';
  document.getElementById(containerId).innerHTML=html;

  // emoji select
  document.getElementById('emoji-sel').addEventListener('click',function(e){
    var item=e.target.closest('.ei2');if(!item)return;
    this.querySelectorAll('.ei2').forEach(function(el){el.classList.remove('sel')});
    item.classList.add('sel');item.setAttribute('data-sel','1');
  });
  // gender select
  document.getElementById('bf-gs').addEventListener('click',function(e){
    var opt=e.target.closest('.go2');if(!opt)return;
    this.querySelectorAll('.go2').forEach(function(el){el.classList.remove('sel')});
    opt.classList.add('sel');
  });
  // save
  document.getElementById('bf-save').addEventListener('click',function(){
    var name=document.getElementById('bf-name').value.trim();
    if(!name){toast('请输入宝贝姓名');return}
    var selE=document.querySelector('#emoji-sel .ei2.sel');
    var avatar=selE?selE.getAttribute('data-e'):'\ud83d\udc76';
    var selG=document.querySelector('#bf-gs .go2.sel');
    var gender=selG?selG.getAttribute('data-v'):'\u7537';
    var birthday=document.getElementById('bf-bday').value;
    var favorite=document.getElementById('bf-fav').value.trim();
    var data={name:name,gender:gender,birthday:birthday,avatar:avatar,favorite:favorite};
    var btn=this;btn.disabled=true;btn.textContent='保存中...';
    if(isEdit){
      af('/api/babies/'+bid,{method:'PUT',body:JSON.stringify(data)})
      .then(function(d){btn.disabled=false;btn.textContent='保存修改';toast('保存成功');nav('#profile')})
      .catch(function(){btn.disabled=false;btn.textContent='保存修改';toast('网络错误')});
    }else{
      af('/api/babies',{method:'POST',body:JSON.stringify(data)})
      .then(function(d){btn.disabled=false;btn.textContent='添加宝贝';toast('添加成功');nav('#profile')})
      .catch(function(){btn.disabled=false;btn.textContent='添加宝贝';toast('网络错误')});
    }
  });
}

/* ===== Event Delegation ===== */
function setupEvents(){
  document.addEventListener('click',function(e){
    var editBtn=e.target.closest('.baby-edit-btn');
    if(editBtn){
      var id=editBtn.getAttribute('data-id');
      af('/api/babies/'+id).then(function(d){
        var b=d;babyEditData=b;nav('#baby-edit');
      }).catch(function(){toast('加载失败')});
      return;
    }
    var delBtn=e.target.closest('.baby-del-btn');
    if(delBtn){
      var id=delBtn.getAttribute('data-id');
      if(confirm('确定要删除这个宝贝吗？')){
        af('/api/babies/'+id,{method:'DELETE'}).then(function(d){
          toast('删除成功');loadProfile();
        }).catch(function(){toast('删除失败')});
      }
      return;
    }
  });
  document.getElementById('go-baby-add').addEventListener('click',function(){
    babyEditData=null;nav('#baby-add');
  });
  document.getElementById('logout-btn').addEventListener('click',function(){
    rtk();nav('#login');toast('已退出登录');
  });
}

var babyEditData=null;
function checkBabyEdit(){
  if(window.location.hash==='#baby-edit'&&babyEditData){
    renderBabyForm('baby-edit-f',babyEditData);
  }
  if(window.location.hash==='#baby-add'&&!babyEditData){
    renderBabyForm('baby-add-f',null);
  }
}

/* ===== Init ===== */
function init(){
  initPg();setupRouter();setupEvents();initLogin();initReg();
  // Monkey-patch nav to handle baby forms
  var origNav=nav;
  window._nav=nav;
  nav=function(h){
    origNav(h);
    setTimeout(checkBabyEdit,50);
  };
  nav(window.location.hash||'#home');
}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init)}else{init()}
})();
